databases:
  - name: jarvis-lite-db
    plan: free
    databaseName: jarvis
    user: jarvis

services:
  - type: worker
    name: jarvis-lite-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jarvis-lite-db
          property: connectionString
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_USER_IDS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.4"
